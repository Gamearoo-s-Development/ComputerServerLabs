name: Package Linux

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Linux packaging tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools fakeroot dpkg

      - name: Build AppImage and deb
        run: bash scripts/linux-package-release.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: computer-server-labs-linux-x64
          path: |
            app/dist/*.AppImage
            app/dist/*.deb
          if-no-files-found: error
